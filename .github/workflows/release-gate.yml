name: Release Gate

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run full release suite
        run: |
          pytest -v --tb=short -m "" --override-ini="addopts=-ra -q --strict-markers"

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run linting with ruff
        run: |
          ruff check engram tests bin

      - name: Check formatting with ruff
        run: |
          ruff format --check engram tests bin

      - name: Type check with mypy
        run: |
          mypy engram --config-file pyproject.toml

  verify-main-test-workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for successful Test workflow on release commit
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EXPECTED_SHA: ${{ github.sha }}
          POLL_INTERVAL_SECONDS: "30"
          MAX_WAIT_SECONDS: "2700"
        with:
          script: |
            const expectedSha = process.env.EXPECTED_SHA;
            const pollIntervalMs =
              Number(process.env.POLL_INTERVAL_SECONDS || "30") * 1000;
            const maxWaitMs =
              Number(process.env.MAX_WAIT_SECONDS || "2700") * 1000;
            const deadline = Date.now() + maxWaitMs;

            while (Date.now() < deadline) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "test.yml",
                event: "push",
                head_sha: expectedSha,
                per_page: 20,
              });

              const runs = response.data.workflow_runs
                .filter(
                  (run) =>
                    run.head_sha === expectedSha &&
                    ["main", "master"].includes(run.head_branch ?? ""),
                )
                .sort((left, right) => {
                  const leftTimestamp = Date.parse(
                    left.run_started_at ?? left.created_at,
                  );
                  const rightTimestamp = Date.parse(
                    right.run_started_at ?? right.created_at,
                  );
                  return rightTimestamp - leftTimestamp;
                });

              if (runs.length === 0) {
                core.info(
                  `No Test workflow run found yet for ${expectedSha}; waiting ${pollIntervalMs / 1000}s`,
                );
              } else {
                const latest = runs[0];
                core.info(
                  `Observed Test workflow run ${latest.id} (${latest.html_url}) status=${latest.status} conclusion=${latest.conclusion}`,
                );
                if (latest.status === "completed") {
                  if (latest.conclusion === "success") {
                    return;
                  }
                  core.setFailed(
                    `Test workflow ${latest.html_url} concluded ${latest.conclusion} for ${expectedSha}`,
                  );
                  return;
                }
              }

              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

            core.setFailed(
              `Timed out waiting for a successful Test workflow run on ${expectedSha}`,
            );

  verify-tag-current:
    runs-on: ubuntu-latest
    needs:
      - test
      - lint
      - verify-main-test-workflow

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the release gate was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

  build-github-release:
    name: Build and upload GitHub Release artifacts
    runs-on: ubuntu-latest
    needs:
      - verify-tag-current

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Verify checked out commit matches tested release commit
        run: |
          test "$(git rev-parse HEAD)" = "${{ github.sha }}"

      - name: Build package
        run: |
          uv build

      - name: Verify release tag still points at tested commit
        env:
          EXPECTED_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --tags "https://github.com/${REPOSITORY}.git" "refs/tags/${TAG_NAME}" "refs/tags/${TAG_NAME}^{}" | awk 'NR==1 { sha=$1 } END { print $1 ? $1 : sha }')"
          if [ -z "${remote_sha}" ]; then
            echo "Tag ${TAG_NAME} no longer exists on origin"
            exit 1
          fi
          if [ "${remote_sha}" != "${EXPECTED_SHA}" ]; then
            echo "Tag ${TAG_NAME} moved while the release workflow was running"
            echo "expected: ${EXPECTED_SHA}"
            echo "actual:   ${remote_sha}"
            exit 1
          fi

      - name: Store the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engram-python-package-distributions
          path: dist/

      - name: Sign the dists with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: dist/*

  deploy-pages-index:
    name: Deploy GitHub Pages package index
    runs-on: ubuntu-latest
    needs:
      - build-github-release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Download release distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: engram-python-package-distributions
          path: dist/

      - name: Build GitHub Pages simple index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python bin/build_github_pages_index.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --dist-dir dist \
            --site-dir site \
            --require-local-dist

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
